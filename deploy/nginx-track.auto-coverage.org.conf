# Install on server 76.13.114.85 (same box as auto-coverage.org)
#
# 1. Copy to: /etc/nginx/sites-available/track.auto-coverage.org
# 2. ln -s /etc/nginx/sites-available/track.auto-coverage.org /etc/nginx/sites-enabled/
# 3. certbot --nginx -d track.auto-coverage.org
# 4. nginx -t && systemctl reload nginx
#
# Tracker must be running on the server, e.g.:
#   cd backend && npm run build && PORT=3001 node dist/main.js
#   (or use pm2: pm2 start dist/main.js --name tracker-api)

server {
    listen 80;
    server_name track.auto-coverage.org;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
