# Tracker API for auto-coverage.org
# MUST use .conf suffix in sites-enabled (Hostinger: include sites-enabled/*.conf)

server {
    listen 80;
    listen [::]:80;
    server_name track.auto-coverage.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name track.auto-coverage.org;

    ssl_certificate /etc/letsencrypt/live/track.auto-coverage.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track.auto-coverage.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
