# Tracker API for nexoquote.com
# Install: sudo cp deploy/nginx-track.nexoquote.com.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/track.nexoquote.com.conf /etc/nginx/sites-enabled/
# Cert:    sudo certbot certonly --nginx -d track.nexoquote.com

server {
    listen 80;
    listen [::]:80;
    server_name track.nexoquote.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name track.nexoquote.com;

    ssl_certificate /etc/letsencrypt/live/track.nexoquote.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track.nexoquote.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
